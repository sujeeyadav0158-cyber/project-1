<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .swap-section {
            display: flex;
            gap: 10px;
            margin: 30px 0;
            align-items: flex-end;
        }

        button {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .icon {
            font-size: 24px;
        }

        .reset-btn {
            background: #f0f0f0;
            color: #333;
            margin-top: 20px;
            width: 100%;
        }

        .reset-btn:hover {
            background: #e0e0e0;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .result {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .result-value {
            background: white;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
        }

        .result-value:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Swap</h1>
        
        <div class="input-group">
            <label for="value1">Value 1</label>
            <input 
                type="text" 
                id="value1" 
                placeholder="Enter first value"
            >
        </div>

        <div class="input-group">
            <label for="value2">Value 2</label>
            <input 
                type="text" 
                id="value2" 
                placeholder="Enter second value"
            >
        </div>

        <div class="swap-section">
            <button id="swapBtn" onclick="swapValues()">
                <span class="icon">⇅</span> Swap
            </button>
        </div>

        <div class="result" id="result">
            <div class="result-label">Result</div>
            <div class="result-value">
                <strong>Value 1:</strong> <span id="result1">-</span>
            </div>
            <div class="result-value">
                <strong>Value 2:</strong> <span id="result2">-</span>
            </div>
        </div>

        <button class="reset-btn" onclick="resetForm()">Reset</button>
    </div>

    <script>
        function swapValues() {
            const value1 = document.getElementById('value1').value;
            const value2 = document.getElementById('value2').value;

            if (value1 === '' || value2 === '') {
                alert('Please enter both values');
                return;
            }

            // Update result display
            document.getElementById('result1').textContent = value2;
            document.getElementById('result2').textContent = value1;
            document.getElementById('result').classList.add('show');

            // Swap input values
            document.getElementById('value1').value = value2;
            document.getElementById('value2').value = value1;
        }

        function resetForm() {
            document.getElementById('value1').value = '';
            document.getElementById('value2').value = '';
            document.getElementById('result').classList.remove('show');
        }

        // Allow Enter key to trigger swap
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                swapValues();
            }
        });
    </script>
</body>
</html>
